<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .left{
            position: fixed;
            left:20px;
            top:20px;
        }

        .right{
            position: fixed;
            right:20px;
            top:20px;
        }

        .main{
            text-align: center;
            margin-top: 100px;
        }

        .first-color{
            color:blueviolet;
        }

        p{
            color:gray;
            font-size: 20px;
        }

        .lens{
            position:relative;
            left:40px
        }
        .search{
            padding: 15px 15px 15px 45px; 
            border-radius: 30px;
            width:50%
        }

        #suggestion-box{
            width: 50%;
            margin-left: 23.9%;
            border-radius: 30px;
            padding: 15px 15px 15px 45px;
            /* border: 1px solid #ccc; */
        }

        #suggestion-items{
            border: 1px solid black;
            width: 700px;
            border-radius: 10px;
            padding: 10px;
        }
    </style>


</head>

<body>
    <div>
    <span class="left">&#9881 </span>
    <span class="right">&#8226 online | &#128337; - ms</span>
    </div>

    <div class="main">

    <h1><span class="first-color">Being</span><span class="last-color" >Infinity</span></h1>
    <p>One million phrases. Four algorithms. Prefix Based Auto Suggest.</p> 

    <span>
        <span class="lens">&#128269;</span>
        <input type="text" class="search" id="search"   placeholder="Start typing to search...">
    </span>

    <div id="suggestion-box">
        <!-- suggestion box -->
    </div>

    </div>


    <script>
        var searchbox=document.getElementById("search");
        var suggestionbox=document.getElementById("suggestion-box");
        search.addEventListener("input",function(){
           // 1. get user input
           // 2. Make API call to get suggestions
           // 3. Display data in html
           
           var userInput=searchbox.value;
           if(userInput.trim()===""){
              
           }
           else{
               var url1= "https://autosuggest-backend.onrender.com/api/autosuggest?q=";
               var url3= "&algorithm=brute&limit=10&weighted=false";
               var url=url1 + userInput + url3;

               fetch(url)
               .then(function(response){
                return response.json();
               })

               .then(function(data){
                console.log(data);
                var resultArray=data.results;
                var htmlResults="";
                for(var i=0;i<resultArray.length;i++)
                {
                    htmlResults+="<div id='suggestion-items'>"+resultArray[i].text+"</div>"
                }

                suggestionbox.innerHTML=htmlResults;
               })
           }
        });
    </script>
</body>
</html>
